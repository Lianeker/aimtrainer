<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>·</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="i-arrow-h" viewBox="0 0 24 24">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <polyline points="7,8 3,12 7,16"/>
      <polyline points="17,8 21,12 17,16"/>
    </symbol>
    <symbol id="i-speaker" viewBox="0 0 24 24">
      <path d="M3 10v4h3.5L11 18V6L6.5 10H3z" fill="currentColor"/>
    </symbol>
    <symbol id="i-radius" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8" fill="currentColor"/>
      <line x1="12" y1="12" x2="20" y2="12" stroke="#0a0e14" stroke-width="1.5"/>
      <circle cx="20" cy="12" r="1.5" fill="#0a0e14"/>
      <circle cx="12" cy="12" r="1.5" fill="#0a0e14"/>
    </symbol>
    <symbol id="i-dispersion" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3" fill="currentColor"/>
      <circle cx="12" cy="12" r="6.5" stroke-dasharray="2 2"/>
      <circle cx="12" cy="12" r="10" stroke-dasharray="1.5 2.5"/>
    </symbol>
    <symbol id="i-oscillate" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
      <circle cx="12" cy="12" r="6" opacity="0.7"/>
      <circle cx="12" cy="12" r="9.5" opacity="0.35"/>
    </symbol>
    <symbol id="i-speed" viewBox="0 0 24 24">
      <line x1="3" y1="12" x2="18" y2="12"/>
      <polyline points="14,7 19,12 14,17"/>
      <line x1="3" y1="7"  x2="8"  y2="7"  opacity="0.5"/>
      <line x1="3" y1="17" x2="8"  y2="17" opacity="0.5"/>
    </symbol>
    <symbol id="i-wave" viewBox="0 0 24 24">
      <path d="M2 14 Q 6 6 10 14 T 18 14" />
      <polyline points="15,11 19,14 15,17"/>
    </symbol>
    <symbol id="i-bullseye" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9.5"/>
      <circle cx="12" cy="12" r="6"/>
      <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
    </symbol>
    <symbol id="i-stopwatch" viewBox="0 0 24 24">
      <circle cx="12" cy="14" r="7.5"/>
      <line x1="12" y1="14" x2="12" y2="9.5"/>
      <line x1="12" y1="14" x2="15.5" y2="14"/>
      <line x1="9.5" y1="3" x2="14.5" y2="3"/>
      <line x1="12" y1="3"  x2="12" y2="6"/>
      <line x1="18" y1="6.5" x2="20" y2="4.5" opacity="0.6"/>
    </symbol>
    <symbol id="i-infinity" viewBox="0 0 24 24">
      <ellipse cx="7.5" cy="12" rx="4.5" ry="4"/>
      <ellipse cx="16.5" cy="12" rx="4.5" ry="4"/>
    </symbol>
    <symbol id="i-play" viewBox="0 0 24 24">
      <polygon points="7,4 7,20 21,12" fill="currentColor"/>
    </symbol>
    <symbol id="i-back" viewBox="0 0 24 24">
      <polyline points="10,5 4,11 10,17"/>
      <path d="M4 11h11c2.5 0 4.5 2 4.5 4.5V20"/>
    </symbol>
    <symbol id="i-save" viewBox="0 0 24 24">
      <path d="M4 4h13l4 4v12H4z"/>
      <rect x="8" y="13" width="8" height="7"/>
      <rect x="8" y="4" width="7" height="5"/>
    </symbol>
    <symbol id="i-saved" viewBox="0 0 24 24">
      <path d="M4 4h13l4 4v12H4z"/>
      <polyline points="8,12 11,15 17,9"/>
    </symbol>
    <symbol id="i-chart" viewBox="0 0 24 24">
      <rect x="4"  y="13" width="3.5" height="7"/>
      <rect x="10.25" y="9"  width="3.5" height="11"/>
      <rect x="16.5" y="5"  width="3.5" height="15"/>
    </symbol>
    <symbol id="i-trash" viewBox="0 0 24 24">
      <path d="M5 7h14"/>
      <path d="M9 7V4h6v3"/>
      <path d="M6.5 7l1 13h9l1-13"/>
      <line x1="10" y1="11" x2="10" y2="17"/>
      <line x1="14" y1="11" x2="14" y2="17"/>
    </symbol>
    <symbol id="i-x" viewBox="0 0 24 24">
      <line x1="6" y1="6" x2="18" y2="18"/>
      <line x1="18" y1="6" x2="6" y2="18"/>
    </symbol>
    <symbol id="i-up" viewBox="0 0 24 24">
      <polyline points="6,14 12,8 18,14"/>
    </symbol>
    <symbol id="i-down" viewBox="0 0 24 24">
      <polyline points="6,10 12,16 18,10"/>
    </symbol>
    <symbol id="i-approx" viewBox="0 0 24 24">
      <path d="M3 10 Q7 5 12 10 T21 10"/>
      <path d="M3 16 Q7 11 12 16 T21 16"/>
    </symbol>
  </defs>
</svg>

<div id="config" class="screen">
  <div class="panel">

    <div class="row">
      <span class="icon"><svg class="ic"><use href="#i-arrow-h"/></svg></span>
      <input id="cfg-width-range" type="range" min="100" step="1">
      <input id="cfg-width" type="number" min="100" step="1">
    </div>

    <div class="row">
      <span class="icon"><svg class="ic rot90"><use href="#i-arrow-h"/></svg></span>
      <input id="cfg-height-range" type="range" min="100" step="1">
      <input id="cfg-height" type="number" min="100" step="1">
    </div>

    <div class="row toggle-row">
      <span class="icon stack">
        <svg class="ic"><use href="#i-speaker"/></svg>
        <span class="badge-mark ok">✓</span>
      </span>
      <label class="switch"><input id="cfg-sound-ok" type="checkbox"><span class="slider"></span></label>
      <span class="spacer"></span>
    </div>

    <div class="row toggle-row">
      <span class="icon stack">
        <svg class="ic"><use href="#i-speaker"/></svg>
        <span class="badge-mark bad">✗</span>
      </span>
      <label class="switch"><input id="cfg-sound-bad" type="checkbox"><span class="slider"></span></label>
      <span class="spacer"></span>
    </div>

    <div class="row">
      <span class="icon"><svg class="ic"><use href="#i-radius"/></svg></span>
      <input id="cfg-radius-range" type="range" min="5" max="200" step="1">
      <input id="cfg-radius" type="number" min="5" step="1">
    </div>

    <div class="row">
      <span class="icon"><svg class="ic"><use href="#i-dispersion"/></svg></span>
      <input id="cfg-dispersion-range" type="range" min="0" max="200" step="1">
      <input id="cfg-dispersion" type="number" min="0" step="1">
    </div>

    <div class="row toggle-row">
      <span class="icon"><svg class="ic"><use href="#i-oscillate"/></svg></span>
      <label class="switch"><input id="cfg-oscillate" type="checkbox"><span class="slider"></span></label>
      <span class="spacer"></span>
    </div>

    <div class="row">
      <span class="icon"><svg class="ic"><use href="#i-speed"/></svg></span>
      <input id="cfg-speed-range" type="range" min="0" max="1500" step="5">
      <input id="cfg-speed" type="number" min="0" step="1">
    </div>

    <div class="row toggle-row">
      <span class="icon"><svg class="ic"><use href="#i-wave"/></svg></span>
      <label class="switch"><input id="cfg-nonlinear" type="checkbox"><span class="slider"></span></label>
      <span class="spacer"></span>
    </div>

    <div class="row mode-row">
      <div class="mode-group">
        <label class="mode" title="targets">
          <input type="radio" name="mode" value="targets">
          <span class="icon"><svg class="ic"><use href="#i-bullseye"/></svg></span>
        </label>
        <label class="mode" title="time">
          <input type="radio" name="mode" value="time">
          <span class="icon"><svg class="ic"><use href="#i-stopwatch"/></svg></span>
        </label>
        <label class="mode" title="infinite">
          <input type="radio" name="mode" value="infinite">
          <span class="icon"><svg class="ic"><use href="#i-infinity"/></svg></span>
        </label>
      </div>
      <input id="cfg-mode-value" type="number" min="1" step="1">
    </div>

    <div class="row buttons-row">
      <button id="history-btn" class="btn big" aria-label="history">
        <svg class="ic"><use href="#i-chart"/></svg>
      </button>
      <button id="play-btn" class="btn big primary" aria-label="play">
        <svg class="ic"><use href="#i-play"/></svg>
      </button>
    </div>

  </div>
</div>

<div id="game" class="screen hidden">
  <canvas id="canvas"></canvas>
</div>

<div id="results" class="screen hidden">
  <div class="panel results-panel">
    <div class="result-row big">
      <span class="icon"><svg class="ic"><use href="#i-stopwatch"/></svg></span>
      <span id="r-avg" class="value"></span>
    </div>
    <div class="result-row">
      <span class="icon"><svg class="ic"><use href="#i-bullseye"/></svg></span>
      <span id="r-hits" class="value"></span>
    </div>
    <div class="result-row">
      <span class="icon"><svg class="ic"><use href="#i-x"/></svg></span>
      <span id="r-miss" class="value"></span>
    </div>
    <div class="result-row small">
      <span class="icon"><svg class="ic"><use href="#i-down"/></svg></span>
      <span id="r-min" class="value"></span>
    </div>
    <div class="result-row small">
      <span class="icon"><svg class="ic"><use href="#i-up"/></svg></span>
      <span id="r-max" class="value"></span>
    </div>
    <div class="result-row small">
      <span class="icon"><svg class="ic"><use href="#i-approx"/></svg></span>
      <span id="r-med" class="value"></span>
    </div>
    <div class="row buttons-row triple">
      <button id="save-btn" class="btn big" aria-label="save">
        <svg class="ic save-ic"><use href="#i-save"/></svg>
        <svg class="ic saved-ic"><use href="#i-saved"/></svg>
      </button>
      <button id="restart-btn" class="btn big primary" aria-label="restart">
        <svg class="ic"><use href="#i-play"/></svg>
      </button>
      <button id="back-btn" class="btn big" aria-label="back">
        <svg class="ic"><use href="#i-back"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="history" class="screen hidden">
  <div class="panel history-panel">
    <div id="history-list" class="history-list"></div>
    <div class="row buttons-row">
      <button id="clear-history-btn" class="btn big danger" aria-label="clear">
        <svg class="ic"><use href="#i-trash"/></svg>
      </button>
      <button id="back-history-btn" class="btn big primary" aria-label="back">
        <svg class="ic"><use href="#i-back"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
